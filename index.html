<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL CLOCK</title>
    <link rel="stylesheet" href="digital_clock.css" >
</head>
<body>

    <div class="main" >

     <div class="datebox">
        <div class="box">
        <div class="label">DATE</div>
        <div class="date" id="datee"></div>
        </div>

        <div class="box">
        <div class="label">MONTH</div>
        <div class="date" id="month"></div>
        </div>

        <div class="box">
        <div class="label">YEAR</div>
        <div class="date" id="year"></div>
        </div>
    </div>
        
    <div class="clock">
        <div class="box">
        <div class="label">HOUR</div>
        <div class="time" id="hour"></div>
        </div>

        <div class="box">
        <div class="label">MIN</div>
        <div class="time" id="min"></div>
        </div>
        
        <div class="box">
        <div class="label">SECS</div>
        <div class="time" id="secs"></div>
        </div>
    </div>

    <div class="day">
        <div class="dot" id="dot0"></div>
        <p>Sun</p>
        <div class="dot" id="dot1"></div>
        <p>Mon</p>
        <div class="dot" id="dot2"></div>
        <p>Tues</p>
        <div class="dot" id="dot3"></div>
        <p>Wed</p>
        <div class="dot" id="dot4"></div>
        <p>Thur</p>
        <div class="dot" id="dot5"></div>
        <p>Fri</p>
        <div class="dot" id="dot6"></div>
        <p>Sat</p>
    </div>

    </div>
    <script src="digital_clock.js"></script>
</body>
</html>
